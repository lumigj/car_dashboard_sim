name: Python checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 pytest
          python -m pip install -r requirements-rpi.txt

      - name: Syntax check
        run: |
          python -m py_compile scripts/obd_interface.py scripts/obd_logger.py dashboard/dashboard.py dashboard/demo1.py

      - name: Lint critical errors
        run: |
          flake8 scripts dashboard --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests if present
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests directory; skipping pytest."
          fi
